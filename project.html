<!DOCTYPE html>

</html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Dashboard</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <h1>Employee Management Dashboard</h1>

    <div class="cards">
        <div class="card">
            Total Employees<br />
            <span id="totalEmp" style="font-size: 23px;">0</span>
        </div>

        <div class="card">
            Average Salary<br />
            $<span id="avgSalary" style="font-size: 23px;">$0</span>
        </div>

        <div class="card">
            Departments<br />
            <span id="totalDept" style="font-size: 23px;">0</span>
        </div>
    </div>

    <div class="buttons">
        <button class="btnSearch" onclick="openModal()">Add Employee</button>
        <select class="search">
            <option value="">Search Employee</option>
            <option value="Ali">Ali</option>
            <option value="Ahmed">Ahmed</option>
            <option value="Usman">Usman</option>
            <option value="Ayan">Ayan</option>
        </select>
        <select class="search">
            <option value="">All Departments</option>
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
        </select>
        <button class="btnSort" onclick="sortData()">Sort Salary</button>
    </div>
    <table class="tablebody">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
    </table>
    <div class="modal" id="employeeModal">
        <div class="addemployeework">
            <h3>Add Employee</h3>
            <div class="name">
                <input type="text" id="name" placeholder="Name">
            </div>
            <div class="department">
                <input type="text" id="department" placeholder="Department">
            </div>
            <div class="salary">
                <input type="number" id="salary" placeholder="Salary">
            </div>
            <button onclick="closeModal()">save</button>
        </div>
    </div>
    <script src="project.js">

    </script>
</body>

</html>
