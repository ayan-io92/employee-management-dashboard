<!DOCTYPE html>
</html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Dashboard</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <h1>Employee Management Dashboard</h1>

    <div class="cards">
        <div class="card">
            Total Employees<br>
            <span id="totalEmp">0</span>
        </div>

        <div class="card">
            Average Salary<br>
            $0<span id="avgSalary">0</span>
        </div>

        <div class="card">
            Departments<br>
            <span id="totalDept">0</span>
        </div>
    </div>

    <div class="buttons">
        <button class="btnSearch" onclick="openModal()">Add Employee</button>
        <input type="text" placeholder="Search employee" class="search">
        <input type="text" placeholder="All departments" class="search">
        <button class="btnSort" onclick="sortData()">Sort Salary</button>
    </div>

    <table class="tablebody">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
    </table>
    <div class="modal" id="employeeModal">
        <div class="addemployeework">
            <h3>Add Employee</h3>

            <div class="name">
                <input type="text" id="name" placeholder="Name">
            </div>
            <div class="department">
                <input type="text" id="department" placeholder="Department">
            </div>
            <div class="salary">
                <input type="number" id="salary" placeholder="Salary">
            </div>
            <button class="save" onclick="closeModal()">save</button>
        </div>
    </div>
    <script src="project.js"></script>
</body>

</html>
