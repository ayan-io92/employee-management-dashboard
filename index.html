<!DOCTYPE html>
</html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Dashboard</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>

    <h1>Employee Management Dashboard</h1>

    <div class="cards">
        <div class="card">
            Total Employees<br />
            <span id="totalEmp" style="font-size: 23px;">0</span>
        </div>

        <div class="card">
            Average Salary<br />
            <span id="avgSalary" style="font-size: 23px;">$0</span>
        </div>

        <div class="card">
            Departments<br />
            <span id="totalDept" style="font-size: 23px;">0</span>
        </div>
    </div>

    <div class="buttons">
        <button class="btnSearch" onclick="openModal()">Add Employee</button>
        <input type="text" class="semp" placeholder="Search employee" id="SearchEmployee" oninput="populateData()">
        <select class="search" name="departments" id="searchDepartment" onchange="populateData()">
            <option value="">All Departments</option>
            <option value="IT">IT</option>
            <option value="Development">Development</option>
            <option value="Sales">Sales</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
        </select>
        <button class="btnSort" onclick="sortData()">Sort Salary</button>
    </div>
    <table class="tablebody">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableData"></tbody>
    </table>
    <div class="modal" id="employeeModal">
        <h3>Add Employee</h3>
        <div class="name">
            <input type="text" id="name" placeholder="Name">
        </div>

        <select class="departments" id="searchDepartment">
            <option value="">Departments</option>
            <option value="IT">IT</option>
            <option value="Development">Development</option>
            <option value="Sales">Sales</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
        </select>
        <div class="salary">
            <input type="number" id="salary" placeholder="Salary">
        </div>
        <button onclick="closeModal()" class="save">save</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
